<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ResQNet Admin Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
background:#f5f7fb;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN CARD */

.login-box{
background:white;
width:380px;
padding:40px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
text-align:center;
}

/* TITLE */

.title{
font-size:24px;
font-weight:600;
color:#2563eb;
margin-bottom:5px;
}

.subtitle{
font-size:14px;
color:#6b7280;
margin-bottom:30px;
}

/* INPUTS */

.input-group{
position:relative;
margin-bottom:18px;
}

input{
width:100%;
padding:12px 40px 12px 12px;
border:1px solid #e5e7eb;
border-radius:8px;
font-size:14px;
outline:none;
transition:0.2s;
}

input:focus{
border-color:#2563eb;
}

/* PASSWORD EYE ICON */

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
color:#9ca3af;
cursor:pointer;
font-size:16px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div class="login-box">

<div class="title">ResQNet Admin Portal</div>
<div class="subtitle">Secure Access for System Administration</div>

<div class="input-group">
<input type="email" id="email" placeholder="Admin Email" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
<i class="fa-solid fa-eye eye" onclick="togglePassword()"></i>
</div>

<button onclick="login()">Login</button>

</div>

<script>

function togglePassword(){

const pass=document.getElementById("password");
const eye=document.querySelector(".eye");

if(pass.type==="password"){
pass.type="text";
eye.classList.replace("fa-eye","fa-eye-slash");
}else{
pass.type="password";
eye.classList.replace("fa-eye-slash","fa-eye");
}

}

async function login(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const response=await fetch(
"https://resqnet-backend-1xe3.onrender.com/api/auth/admin/login",
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email,password })
});

const data=await response.json();

if(response.ok){
localStorage.setItem("token",data.token);
window.location.href="index.html";
}else{
alert(data.message);
}

}

</script>

</body>
</html>
